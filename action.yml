name: "Docs as Code - Confluence"
description: "Publish the content of a folder to confluence"
branding:
  icon: 'book-open'
  color: 'blue'
author: "Bhacaz"
inputs:
  folder:
    description: "Folder containing the documentation to publish."
    required: true
  username:
    description: "Confluence username or email"
    required: false
  password:
    description: "Confluence password or API key"
    required: false
  confluence-base-url:
    description: "Your Confluence url"
    required: false
  space-key:
    description: "Confluence space key to publish the documentation"
    required: false
  parent-page-id:
    description: "Page id under which the documentation will be published"
    required: false
  dry-run:
    description: "If true, do not publish to Confluence and generate HTML previews locally"
    required: false
    default: "false"
  preview-output-folder:
    description: "Output folder used in dry-run mode to store generated HTML files"
    required: false
    default: "preview-html"
runs:
  using: "node20"
  main: "dist/index.js"
